<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{{TITLE}}</title>
<style>
  :root {
    /* ---- editorial-on-vellum palette ---- */
    --bg: #faf9f5;
    --surface: #ffffff;
    --ink: #141413;
    --graphite: #3d3d3a;
    --muted: #73726c;
    --faint: #9c9a92;
    --border: #dedcd1;
    --highlight: #fff7ca;
    --accent: #d97757;
    --accent-soft: rgba(217, 119, 87, 0.14);

    /* semantic status tones — kept muted/desaturated, never as loud as --accent */
    --success: #4f7d5f;
    --success-soft: rgba(79, 125, 95, 0.14);
    --warn: #a9791f;
    --warn-soft: rgba(169, 121, 31, 0.14);
    --danger: #b3433a;
    --danger-soft: rgba(179, 67, 58, 0.14);

    --shadow-hairline: 0 1px 2px rgba(20, 20, 19, 0.05);

    --font-serif: Charter, "Iowan Old Style", "Palatino Linotype", Georgia, serif;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;

    --radius: 10px;
    --radius-lg: 12px;
    --radius-pill: 999px;
    --sp-1: 4px;
    --sp-2: 8px;
    --sp-3: 14px;
    --sp-4: 20px;
    --sp-5: 28px;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.5;
    overflow: hidden;
  }

  * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  *::-webkit-scrollbar { width: 8px; height: 8px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  *::-webkit-scrollbar-thumb:hover { background: var(--faint); }

  button, textarea, input {
    font-family: inherit;
    font-size: inherit;
    color: inherit;
  }

  button {
    cursor: pointer;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100vw;
  }

  /* ---- topbar ---- */

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--sp-4);
    height: 48px;
    flex-shrink: 0;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: var(--sp-2);
    min-width: 0;
  }

  .title {
    font-family: var(--font-serif);
    font-weight: 500;
    font-size: 16px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 40vw;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: var(--sp-3);
  }

  .presence-pill {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: var(--radius-pill);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    white-space: nowrap;
  }

  .presence-pill[data-state="listening"] { color: var(--success); background: var(--success-soft); border-color: rgba(79,125,95,0.35); }
  .presence-pill[data-state="working"] { color: var(--accent); background: var(--accent-soft); border-color: rgba(217,119,87,0.35); }
  .presence-pill[data-state="waiting"] { color: var(--muted); background: var(--surface); border-color: var(--border); }
  .presence-pill[data-state="ended"] { color: var(--danger); background: var(--danger-soft); border-color: rgba(179,67,58,0.35); }

  .presence-pill.pulse { animation: presence-pulse 1.4s ease-in-out infinite; }

  @keyframes presence-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .mode-toggle {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 12px;
    font-weight: 500;
    color: var(--ink);
  }

  .mode-toggle.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .menu { position: relative; }

  .menu-btn {
    background: transparent;
    border: 1px solid transparent;
    border-radius: var(--radius);
    width: 28px;
    height: 28px;
    line-height: 1;
    font-size: 16px;
    color: var(--muted);
  }

  .menu-btn:hover { background: var(--bg); border-color: var(--border); }

  .menu-dropdown {
    position: absolute;
    right: 0;
    top: 34px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    min-width: 170px;
    padding: 4px;
    z-index: 20;
    box-shadow: var(--shadow-hairline);
  }

  .menu-dropdown button {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    border: none;
    padding: 7px 10px;
    border-radius: 6px;
    color: var(--ink);
  }

  .menu-dropdown button:hover { background: var(--bg); }

  /* ---- main layout ---- */

  .main {
    flex: 1;
    display: flex;
    min-height: 0;
  }

  .artifact-pane {
    position: relative;
    flex: 1 1 auto;
    min-width: 0;
    background: #fff;
  }

  .reload-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    z-index: 5;
    background: linear-gradient(90deg, transparent, var(--warn), transparent);
    background-size: 200% 100%;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease;
  }

  .reload-bar.active {
    opacity: 1;
    animation: reload-sweep 1s linear infinite;
  }

  @keyframes reload-sweep {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .reload-chip {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%) translateY(-8px);
    z-index: 6;
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--warn);
    color: var(--ink);
    padding: 4px 12px;
    border-radius: var(--radius-pill);
    font-size: 11px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease, transform 0.15s ease;
    box-shadow: var(--shadow-hairline);
  }

  .reload-chip.active {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .reload-chip .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--warn);
    animation: pulse-dot 1s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 0.35; }
    50% { opacity: 1; }
  }

  .artifact-frame {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* ---- resizable divider ---- */

  .sidebar-drag {
    width: 6px;
    flex-shrink: 0;
    cursor: col-resize;
    background: transparent;
    position: relative;
    touch-action: none;
  }

  .sidebar-drag::after {
    content: "";
    position: absolute;
    top: 0;
    bottom: 0;
    left: 2px;
    width: 1px;
    background: var(--border);
  }

  .sidebar-drag:hover::after,
  .sidebar-drag.dragging::after {
    background: var(--ink);
    width: 2px;
  }

  /* ---- sidebar shell ---- */

  .sidebar {
    width: 360px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    min-height: 0;
    background: var(--bg);
  }

  /* ---- session view ---- */

  .session-view {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .session-scroll {
    flex: 0 1 auto;
    max-height: 34%;
    overflow-y: auto;
    padding: var(--sp-3) var(--sp-4) var(--sp-2);
    border-bottom: 1px solid var(--border);
  }

  .plan-header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--sp-2);
  }

  .plan-header-title {
    font-family: var(--font-serif);
    font-weight: 500;
    font-size: 16px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #planHeader { display: flex; flex-direction: column; gap: var(--sp-1); margin-bottom: var(--sp-2); }

  details.collapsible {
    border-top: 1px solid var(--border);
    padding: var(--sp-2) 0 0;
  }

  details.collapsible:first-of-type { border-top: none; padding-top: 0; margin-top: var(--sp-2); }

  details.collapsible summary {
    cursor: pointer;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    list-style: none;
    display: flex;
    align-items: center;
    gap: var(--sp-1);
    padding: var(--sp-1) 0;
    user-select: none;
  }

  details.collapsible summary::-webkit-details-marker { display: none; }

  details.collapsible summary::before {
    content: "▸";
    display: inline-block;
    font-size: 9px;
    color: var(--faint);
    transition: transform 0.12s ease;
  }

  details.collapsible[open] summary::before { transform: rotate(90deg); }

  .collapsible-count {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-pill);
    padding: 0 6px;
    font-size: 10px;
    color: var(--muted);
  }

  .collapsible-body {
    display: flex;
    flex-direction: column;
    gap: var(--sp-2);
    padding: var(--sp-1) 0 var(--sp-2);
  }

  .muted { color: var(--muted); line-height: 1.5; }

  .empty-note {
    color: var(--faint);
    font-style: italic;
    padding: var(--sp-1) 0;
    line-height: 1.5;
  }

  .queue-list, .chat-list { display: flex; flex-direction: column; gap: var(--sp-2); }

  .review-item {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--surface);
  }

  .review-head {
    padding: var(--sp-2);
    cursor: pointer;
    color: var(--muted);
    font-size: 12px;
  }

  .review-head:hover { background: var(--bg); }

  .review-body {
    padding: var(--sp-2);
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: var(--sp-1);
  }

  .review-body[hidden] { display: none; }

  .review-prompt { color: var(--ink); font-size: 12px; }

  /* ---- status chip ---- */

  .status-chip {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: var(--radius-pill);
    font-weight: 600;
    text-transform: capitalize;
    border: 1px solid transparent;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .status-chip[data-status="draft"] { background: rgba(115,114,108,0.12); color: var(--muted); border-color: rgba(115,114,108,0.3); }
  .status-chip[data-status="in-review"] { background: var(--warn-soft); color: var(--warn); border-color: rgba(169,121,31,0.35); }
  .status-chip[data-status="reviewed"] { background: var(--success-soft); color: var(--success); border-color: rgba(79,125,95,0.35); }

  /* feature status chip (execution section) */
  .status-chip[data-status="shipped"] { background: var(--success-soft); color: var(--success); border-color: rgba(79,125,95,0.35); }
  .status-chip[data-status="in-progress"] { background: var(--warn-soft); color: var(--warn); border-color: rgba(169,121,31,0.35); }
  .status-chip[data-status="blocked"] { background: var(--danger-soft); color: var(--danger); border-color: rgba(179,67,58,0.35); }
  .status-chip[data-status="planned"],
  .status-chip[data-status="cut"] { background: rgba(115,114,108,0.12); color: var(--muted); border-color: rgba(115,114,108,0.3); }

  /* ---- execution section ---- */

  .exec-feature-row {
    display: flex;
    align-items: center;
    gap: var(--sp-2);
  }

  .exec-evidence {
    color: var(--muted);
    font-size: 11px;
    line-height: 1.4;
    margin-top: var(--sp-1);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .exec-section {
    display: flex;
    flex-direction: column;
    gap: var(--sp-1);
  }

  .exec-subhead {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
  }

  .health-line {
    font-size: 11px;
    line-height: 1.5;
  }

  .health-line.ok { color: var(--success); }
  .health-line.fail { color: var(--danger); }

  .checkpoint-line {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.4;
  }

  .verdict-chips {
    display: flex;
    flex-wrap: wrap;
    gap: var(--sp-1);
  }

  .verdict-chip {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: var(--radius-pill);
    font-weight: 600;
    border: 1px solid transparent;
    white-space: nowrap;
  }

  .verdict-chip[data-verdict="PASS"] { background: var(--success-soft); color: var(--success); border-color: rgba(79,125,95,0.35); }
  .verdict-chip[data-verdict="FAIL"] { background: var(--danger-soft); color: var(--danger); border-color: rgba(179,67,58,0.35); }
  .verdict-chip[data-verdict="BLOCKED"],
  .verdict-chip[data-verdict="unknown"] { background: rgba(115,114,108,0.12); color: var(--muted); border-color: rgba(115,114,108,0.3); }

  .exec-shots {
    display: flex;
    gap: var(--sp-2);
    overflow-x: auto;
    padding-bottom: var(--sp-1);
  }

  .exec-shot-thumb {
    flex-shrink: 0;
    width: 64px;
    height: 48px;
    object-fit: cover;
    border-radius: 4px;
    border: 1px solid var(--border);
    cursor: pointer;
    background: var(--bg);
  }

  .exec-shot-thumb:hover { border-color: var(--accent); }

  /* ---- server-restart chip (fixed, above everything) ---- */

  .server-chip {
    position: fixed;
    top: 10px;
    left: 50%;
    transform: translateX(-50%) translateY(-8px);
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--warn);
    color: var(--ink);
    padding: 4px 12px;
    border-radius: var(--radius-pill);
    font-size: 11px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease, transform 0.15s ease;
    box-shadow: var(--shadow-hairline);
  }

  .server-chip.active {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .server-chip.failed { border-color: var(--danger); }

  .server-chip .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--warn);
    animation: pulse-dot 1s ease-in-out infinite;
  }

  .server-chip.failed .dot {
    background: var(--danger);
    animation: none;
  }

  /* ---- conversation ---- */

  .conversation {
    flex: 1 1 auto;
    min-height: 50%;
    overflow-y: auto;
    padding: var(--sp-3) var(--sp-4);
    display: flex;
    flex-direction: column;
    gap: var(--sp-3);
  }

  .annotation-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: var(--sp-2);
    background: var(--highlight);
    display: flex;
    flex-direction: column;
    gap: var(--sp-2);
  }

  .annotation-label {
    font-size: 11px;
    color: var(--graphite);
    display: flex;
    align-items: center;
    gap: var(--sp-1);
  }

  .annotation-input {
    width: 100%;
    resize: vertical;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: var(--sp-2);
    color: var(--ink);
  }

  .annotation-input::placeholder { color: var(--faint); }

  .annotation-actions { display: flex; justify-content: flex-end; }

  .card-cancel {
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 11px;
    padding: 2px 4px;
  }

  .card-cancel:hover { color: var(--danger); }

  .annotation-pill {
    display: flex;
    align-items: center;
    gap: var(--sp-2);
    background: var(--highlight);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 10px;
    cursor: pointer;
  }

  .annotation-pill:hover { border-color: var(--faint); }

  .annotation-pill.decision { border-color: rgba(217,119,87,0.4); }

  .pill-badge {
    flex-shrink: 0;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .pill-badge.decision {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .pill-label {
    flex: 1 1 auto;
    font-size: 12px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--ink);
  }

  .pill-remove {
    background: transparent;
    border: none;
    color: var(--faint);
    font-size: 14px;
    line-height: 1;
    flex-shrink: 0;
  }

  .pill-remove:hover { color: var(--danger); }

  .chat-bubble {
    max-width: 88%;
    padding: 8px 12px;
    border-radius: var(--radius-lg);
    line-height: 1.55;
    font-size: 14px;
  }

  .chat-bubble.user {
    align-self: flex-end;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--ink);
    border-bottom-right-radius: 3px;
  }

  .chat-bubble.agent {
    align-self: flex-start;
    background: var(--bg);
    border: none;
    color: var(--ink);
    border-bottom-left-radius: 3px;
  }

  .bubble-text { white-space: pre-wrap; word-break: break-word; }

  /* ---- composer ---- */

  .composer {
    flex-shrink: 0;
    padding: var(--sp-3) var(--sp-4);
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    gap: var(--sp-2);
  }

  .status-line {
    max-height: 0;
    overflow: hidden;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.4;
    transition: max-height 0.15s ease;
  }

  .status-line.visible { max-height: 20px; }
  .status-line.working { color: var(--accent); }
  .status-line.listening { color: var(--success); }

  #composerInput {
    width: 100%;
    resize: vertical;
    min-height: 44px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: var(--sp-2);
    color: var(--ink);
  }

  #composerInput::placeholder { color: var(--faint); }

  #composerInput:focus {
    outline: none;
    border-color: var(--ink);
    box-shadow: 0 0 0 2px rgba(20,20,19,0.06);
  }

  .composer-actions {
    display: flex;
    justify-content: flex-end;
    gap: var(--sp-2);
  }

  .composer-actions button {
    border: 1px solid var(--ink);
    border-radius: var(--radius);
    padding: 6px 14px;
    background: var(--ink);
    color: #fff;
    font-weight: 500;
  }

  .composer-actions button.secondary {
    background: transparent;
    color: var(--ink);
    border-color: var(--border);
  }

  .composer-actions button:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }

</style>
</head>
<body>
<div class="server-chip" id="serverChip"><span class="dot"></span><span id="serverChipText">server restarting&hellip;</span></div>
<div class="app" id="app" data-key="{{KEY}}">
  <header class="topbar">
    <div class="topbar-left">
      <span class="title" id="planTitle">{{TITLE}}</span>
    </div>
    <div class="topbar-right">
      <span class="presence-pill" id="presencePill" data-state="waiting">No agent connected</span>
      <button class="mode-toggle" id="modeToggle" type="button" title="Toggle annotate mode (Cmd/Ctrl+I)">Explore</button>
      <div class="menu">
        <button class="menu-btn" id="menuBtn" type="button" aria-label="More options">&#8942;</button>
        <div class="menu-dropdown" id="menuDropdown" hidden>
          <button type="button" data-action="end">End session</button>
          <button type="button" data-action="copy-path">Copy file path</button>
          <button type="button" data-action="reload">Reload artifact</button>
        </div>
      </div>
    </div>
  </header>
  <main class="main">
    <div class="artifact-pane">
      <div class="reload-bar" id="reloadBar"></div>
      <div class="reload-chip" id="reloadChip"><span class="dot"></span>Updating plan&hellip;</div>
      <iframe
        id="artifactFrame"
        class="artifact-frame"
        sandbox="allow-scripts allow-forms allow-popups allow-downloads"
        title="Review artifact"
      ></iframe>
    </div>
    <div class="sidebar-drag" id="sidebarDrag" title="Drag to resize (double-click to reset)"></div>
    <aside class="sidebar" id="sidebar">
      <!-- Session view: the only sidebar surface. Browsing all plans / past
           review sessions is a separate, backlogged surface — not here. -->
      <div class="session-view" id="sessionView">
        <div class="session-scroll" id="sessionScroll">
          <div id="planHeader"></div>
          <details class="collapsible" id="contextStrip">
            <summary>Context <span class="collapsible-count" id="contextCount"></span></summary>
            <div class="collapsible-body" id="contextStripBody"></div>
          </details>
          <details class="collapsible" id="roundsStrip">
            <summary>Review rounds this plan <span class="collapsible-count" id="roundsCount"></span></summary>
            <div class="collapsible-body" id="roundsStripBody"></div>
          </details>
          <details class="collapsible" id="executionStrip" hidden>
            <summary>Execution <span class="collapsible-count" id="executionCount"></span></summary>
            <div class="collapsible-body" id="executionStripBody">
              <div class="exec-section">
                <div id="execFeature"></div>
              </div>
              <div class="exec-section">
                <div class="exec-subhead">Harness health</div>
                <div id="execHealth"></div>
              </div>
              <div class="exec-section">
                <div class="exec-subhead">Checkpoints</div>
                <div id="execCheckpoints"></div>
              </div>
              <div class="exec-section">
                <div class="exec-subhead">Verifications</div>
                <div id="execVerifications"></div>
              </div>
              <div class="exec-section">
                <div class="exec-subhead">Screenshots</div>
                <div id="execShots" class="exec-shots"></div>
              </div>
            </div>
          </details>
        </div>
        <div class="conversation" id="conversation">
          <div class="queue-list" id="queueList"></div>
          <div class="chat-list" id="chatList"></div>
        </div>
        <div class="composer" id="composer">
          <div class="status-line" id="statusLine"></div>
          <textarea id="composerInput" rows="2" placeholder="Message the agent... (Enter to send, Shift+Enter for newline)"></textarea>
          <div class="composer-actions">
            <button type="button" id="sendBtn">Send to Agent</button>
            <button type="button" id="sendEndBtn" class="secondary">Send &amp; End</button>
          </div>
        </div>
      </div>
    </aside>
  </main>
</div>
<script type="module" src="/chrome.js"></script>
</body>
</html>
